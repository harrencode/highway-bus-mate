services:
  highway-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    platform: linux/amd64
    container_name: highway_bus_mate_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      highway-mysql:
        condition: service_healthy
    environment:
      APP_NAME: Highway Bus Mate API
      APP_ENV: development
      DB_HOST: highway-mysql
      DB_PORT: 3306
      TEST_DB_HOST: highway-mysql
      TEST_DB_PORT: 3306
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "bash /app/scripts/migrate.sh &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  highway-mysql:
    image: mysql:8.0
    container_name: highway_bus_mate_mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_123}
      MYSQL_DATABASE: ${DB_NAME:-hbm_db}
      MYSQL_USER: ${DB_USER:-hbm_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      MYSQL_TEST_DATABASE: ${TEST_DB_NAME:-hbm_test_db}
    volumes:
      - highway_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  highway_mysql_data:

networks: {}

